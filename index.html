<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VentureScope</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/ai_library_icon.svg">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --border: #E4E4E0;
      --border-hi: #AEAEAA;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --faint: #9A9A9A;
      --faintest: #DCDCD8;
      --accent: #3D3D3D;
      --accent2: #6B6B6B;
      --r: 10px;
      --r-sm: 6px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 660px;
      margin: 0 auto;
      padding: 60px 20px 96px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 52px;
    }

    .logo-box {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-box img {
      width: 13px;
      height: 13px;
      filter: invert(1) brightness(10);
    }

    .wm-name {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .01em;
    }

    .wm-ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--faint);
      margin-left: 4px;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
      background: #FAFAF8;
    }

    .meta-cell {
      flex: 1;
      padding: 12px 16px;
      border-right: 0.5px solid var(--border);
    }

    .meta-cell:last-child {
      border-right: none;
    }

    .meta-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 1px;
    }

    .meta-lbl {
      font-size: 11px;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .s-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .s-ok {
      background: #4A9E6B;
    }

    .s-err {
      background: #DCDCD8;
    }

    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--faint);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 8px 12px 8px 30px;
      background: #FAFAF8;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .12s;
    }

    .search-wrap input::placeholder {
      color: var(--faint);
    }

    .search-wrap input:focus {
      border-color: var(--border-hi);
    }

    .pills {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .pill {
      font-size: 12px;
      font-weight: 400;
      padding: 4px 11px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .1s;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .pill:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    .pill.on {
      background: var(--text);
      border-color: var(--text);
      color: #FFFFFF;
    }

    .sec-hdr {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 28px 0 8px;
    }

    .sec-hdr:first-of-type {
      margin-top: 0;
    }

    .sec-hdr em {
      font-style: normal;
      font-weight: 400;
      letter-spacing: 0;
      font-size: 11px;
    }

    .group {
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      background: var(--surface);
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-top: 0.5px solid var(--faintest);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      background: transparent;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
      transition: background .1s;
    }

    .row:first-child {
      border-top: none;
    }

    .row:hover {
      background: #FAFAF8;
    }

    .row-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--faintest);
      min-width: 18px;
      flex-shrink: 0;
      user-select: none;
    }

    .row-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: .45;
      transition: opacity .1s;
    }

    .row:hover .row-dot {
      opacity: .85;
    }

    .row-body {
      flex: 1;
      min-width: 0;
    }

    .row-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
    }

    .row-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      border: 0.5px solid;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: .02em;
    }

    .row-arr {
      flex-shrink: 0;
      color: var(--faintest);
      transition: color .1s, transform .1s;
    }

    .row:hover .row-arr {
      color: var(--muted);
      transform: translateX(2px);
    }

    #empty {
      display: none;
      padding: 48px 0;
      text-align: center;
      font-size: 13px;
      color: var(--faint);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, .18);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.on {
      display: flex;
    }

    .modal {
      background: #FFFFFF;
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
      position: relative;
      box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
    }

    .modal h2 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .modal p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .modal input[type="password"] {
      width: 100%;
      padding: 8px 11px;
      background: #FAFAF8;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      margin-bottom: 12px;
      transition: border-color .12s;
    }

    .modal input:focus {
      border-color: var(--border-hi);
    }

    .modal-row {
      display: flex;
      gap: 8px;
    }

    .btn-p {
      flex: 1;
      padding: 8px;
      background: var(--text);
      color: #FFFFFF;
      border: none;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity .1s;
    }

    .btn-p:hover {
      opacity: .75;
    }

    .btn-g {
      padding: 8px 14px;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 13px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .1s;
    }

    .btn-g:hover {
      border-color: var(--border-hi);
      color: var(--text);
    }

    .btn-x {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--faint);
      font-size: 14px;
      line-height: 1;
      padding: 4px;
    }

    .btn-x:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="wordmark">
      <div class="logo-box">
        <img src="assets/ai_library_icon.svg" alt="">
      </div>
      <span class="wm-name">VentureScope</span>
      <span class="wm-ver">2.5</span>
    </div>

    <h1>Knowledge hub</h1>
    <p class="sub">Agentic workflows, learning paths, and developer tools.</p>

    <div class="meta">
      <div class="meta-cell">
        <div class="meta-n" id="totalN">11</div>
        <div class="meta-lbl">Entries</div>
      </div>
      <div class="meta-cell">
        <div class="meta-n">4</div>
        <div class="meta-lbl">Categories</div>
      </div>
      <div class="meta-cell">
        <div class="meta-n">
          <span class="s-dot s-err" id="sDot"></span><span id="sLabel" style="font-size:13px;font-weight:400;">Not
            set</span>
        </div>
        <div class="meta-lbl">API key</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="5.5" cy="5.5" r="3.5" />
        <path d="M9 9l2.5 2.5" stroke-linecap="round" />
      </svg>
      <input id="search" type="text" placeholder="Search entries…" oninput="render()">
    </div>

    <div class="pills" id="pills">
      <button class="pill on" data-f="all" onclick="setF(this)">All</button>
      <button class="pill" data-f="intelligence" onclick="setF(this)">Intelligence</button>
      <button class="pill" data-f="learning" onclick="setF(this)">Learning</button>
      <button class="pill" data-f="flutter" onclick="setF(this)">Flutter</button>
      <button class="pill" data-f="backend" onclick="setF(this)">Backend</button>
      <button class="pill" data-f="tools" onclick="setF(this)">Tools</button>
      <button class="pill" data-f="personal" onclick="setF(this)">Personal</button>
    </div>

    <div id="list"></div>
    <div id="empty">No entries match.</div>

  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeM()">
    <div class="modal">
      <button class="btn-x" onclick="closeM()">&#x2715;</button>
      <h2>API configuration</h2>
      <p>Paste your Gemini API key to enable intelligence features.</p>
      <input type="password" id="ki" placeholder="AIza…">
      <div class="modal-row">
        <button class="btn-p" onclick="saveK()">Save key</button>
        <button class="btn-g" onclick="revokeK()">Revoke</button>
      </div>
    </div>
  </div>

  <script>
    const CATS = {
      intelligence: { label: 'Intelligence', color: '#3D7A8A' },
      learning: { label: 'Learning', color: '#5A6B7B' },
      flutter: { label: 'Flutter', color: '#3D7A8A' },
      backend: { label: 'Backend', color: '#5A6B7B' },
      tools: { label: 'Tools', color: '#9A9A9A' },
      personal: { label: 'Personal', color: '#3D7A8A' },
    };

    const DATA = [
      { n: '01', title: 'Market Scope', desc: 'Signal detection from social media noise.', cat: 'intelligence', href: 'apps/market_scope.html' },
      { n: '02', title: 'Engineer Roadmap', desc: '45-day Agentic AI architecture curriculum.', cat: 'learning', href: 'apps/roadmap.html' },
      { n: '03', title: 'ExplainScope', desc: 'API rate limiting and traffic control deep dive.', cat: 'learning', href: 'apps/explain_scope.html' },
      { n: '04', title: 'AWS EC2 Guide', desc: 'Interactive Amazon EC2 instance infographic.', cat: 'learning', href: 'apps/aws_EC2.html' },
      { n: '05', title: 'Flutter DI', desc: 'Dependency injection patterns with GetIt.', cat: 'flutter', href: 'apps/Flutter Dependency Injection.html' },
      { n: '06', title: 'Flutter Mixins', desc: 'Mixins in Dart and Flutter, applied.', cat: 'flutter', href: 'apps/Flutter Mixins.html' },
      { n: '07', title: 'Flutter & Serverless', desc: 'Serverless backend integration for Flutter apps.', cat: 'flutter', href: 'apps/Flutter DI and Serverless Backends.html' },
      { n: '08', title: 'DataJpa Test', desc: 'Spring Data JPA testing — slices and H2.', cat: 'backend', href: 'apps/DataJpaTest.html' },
      { n: '09', title: 'System Config', desc: 'Manage API keys and connected services.', cat: 'tools', action: 'openM()' },
      { n: '10', title: 'Legacy Hub', desc: 'Archived previous dashboard version.', cat: 'tools', href: 'apps/legacy_hub.html' },
    ];

    let activeF = 'all';

    function setF(btn) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
      btn.classList.add('on');
      activeF = btn.dataset.f;
      render();
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const list = document.getElementById('list');
      list.innerHTML = '';

      const items = DATA.filter(e => {
        return (activeF === 'all' || e.cat === activeF) &&
          (!q || e.title.toLowerCase().includes(q) || e.desc.toLowerCase().includes(q));
      });

      document.getElementById('empty').style.display = items.length ? 'none' : 'block';

      const grouped = activeF === 'all' && !q;
      if (grouped) {
        const gs = {};
        items.forEach(e => { if (!gs[e.cat]) gs[e.cat] = []; gs[e.cat].push(e); });
        Object.entries(gs).forEach(([cat, arr]) => {
          const h = document.createElement('div');
          h.className = 'sec-hdr';
          h.innerHTML = `${CATS[cat].label}<em>${arr.length}</em>`;
          list.appendChild(h);
          list.appendChild(mkGroup(arr));
        });
      } else {
        if (items.length) list.appendChild(mkGroup(items));
      }
    }

    function mkGroup(items) {
      const g = document.createElement('div');
      g.className = 'group';
      items.forEach(e => g.appendChild(mkRow(e)));
      return g;
    }

    function mkRow(e) {
      const el = e.href ? document.createElement('a') : document.createElement('button');
      if (e.href) el.href = e.href; else el.onclick = () => eval(e.action);
      el.className = 'row';
      const c = CATS[e.cat];
      el.innerHTML = `
    <span class="row-n">${e.n}</span>
    <span class="row-dot" style="background:${c.color}"></span>
    <span class="row-body">
      <span class="row-title">${e.title}</span>
      <span class="row-desc">${e.desc}</span>
    </span>
    <span class="row-badge" style="color:${c.color};border-color:${c.color}30">${c.label}</span>
    <svg class="row-arr" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12">
      <path d="M2 6h8M7 3l3 3-3 3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
      return el;
    }

    const SK = 'VentureScope_Gemini_Secret_Salt_v1', KK = 'gemini_api_key';
    function xor(s) { let r = ''; for (let i = 0; i < s.length; i++)r += String.fromCharCode(s.charCodeAt(i) ^ SK.charCodeAt(i % SK.length)); return r; }
    function enc(t) { try { return btoa(xor(t)); } catch (e) { return ''; } }
    function dec(c) { try { return xor(atob(c)); } catch (e) { return ''; } }

    function chkKey() {
      let ok = false; try { ok = dec(localStorage.getItem(KK) || '').length > 5; } catch (e) { }
      document.getElementById('sDot').className = 's-dot ' + (ok ? 's-ok' : 's-err');
      document.getElementById('sLabel').textContent = ok ? 'Connected' : 'Not set';
    }

    function openM() { document.getElementById('overlay').classList.add('on'); }
    function closeM() { document.getElementById('overlay').classList.remove('on'); }
    function saveK() { const v = document.getElementById('ki').value.trim(); if (v) { localStorage.setItem(KK, enc(v)); chkKey(); closeM(); document.getElementById('ki').value = ''; } }
    function revokeK() { localStorage.removeItem(KK); chkKey(); closeM(); }

    document.addEventListener('DOMContentLoaded', () => { render(); chkKey(); });
  </script>
</body>
</html>
